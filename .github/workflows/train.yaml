name: Training Pipeline

on: 
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'


jobs:
  train_model:
    name: Train Model
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TRAIN_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.train
          load: true
          tags: solar-train:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Training Container
        run: |
          docker run --rm \
            -e OFFLINE_FS_URI=${{ vars.GCP_OFFLINE_FEATURE_STORE_BUCKET }} \
            -e WANDB_ENTITY=${{ vars.WANDB_ENTITY }} \
            -e WANDB_PROJECT=${{ vars.WANDB_PROJECT }} \
            -e WANDB_API_KEY=${{ secrets.WANDB_API_KEY }} \
            -e GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }} \
            -v ${{ steps.auth.outputs.credentials_file_path }}:${{ steps.auth.outputs.credentials_file_path }}:ro \
            solar-train