name: API Deployment

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/inference/**'
      - 'Dockerfile.api'
      - 'src/training/dataset.py'


jobs:
  deploy_api:
    name: Deploy API
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_API_SERVICE_ACCOUNT }}

      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ vars.GCP_REGISTRY_URI }}/solar-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to GCR
        run: |
          gcloud run deploy ${{ vars.GCP_FASTAPI_SERVICE }} \
            --image=${{ vars.GCP_REGISTRY_URI }}/solar-api:${{ github.sha }} \
            --startup-probe httpGet.path=/ready,httpGet.port=8000 \
            --region ${{ vars.GCP_REGION }} \
            --port 8000 \
            --set-env-vars WANDB_ENTITY=${{ vars.WANDB_ENTITY }},WANDB_PROJECT=${{ vars.WANDB_PROJECT }},ONLINE_FS_URI=${{ vars.GCP_ONLINE_FEATURE_STORE_BUCKET }},WANDB_API_KEY=${{ secrets.WANDB_API_KEY }}